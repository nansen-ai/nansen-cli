name: "AI Code Review"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      test_status: ${{ steps.summary.outputs.status }}
      test_summary: ${{ steps.summary.outputs.summary }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Run tests with coverage
        id: tests
        run: |
          npx vitest run --coverage 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Summarize
        id: summary
        run: |
          if [ "${{ steps.tests.outputs.exit_code }}" = "0" ]; then
            echo "status=✅ All tests passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=❌ Tests failed — see CI logs" >> "$GITHUB_OUTPUT"
          fi
          LINES=$(tail -20 test-output.txt | head -10)
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "summary<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$LINES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

  review:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          track_progress: true
          use_sticky_comment: true
          claude_args: --allowedTools "Read,Glob,Grep,WebFetch"
          prompt: |
            You are a senior code reviewer for nansen-cli, an open-source Node.js CLI for the Nansen blockchain analytics API. Designed for AI agents to query onchain data.

            ## CI Test Results

            ${{ needs.test.outputs.test_status }}
            ```
            ${{ needs.test.outputs.test_summary }}
            ```

            ## Instructions

            Read the full source files for context — diffs alone can be misleading.

            Review criteria:
            1. Code Quality — Readability, naming, structure, DRY, idiomatic JS/Node.js
            2. Correctness — Logic errors, edge cases, error handling
            3. Test Coverage — Are new code paths tested? Are tests meaningful?
            4. API Design — CLI UX, consistent patterns, helpful error messages
            5. Documentation — Help text, README, comments where needed
            6. Dependencies — New deps justified and well-maintained?
            7. Performance — N+1 API calls, blocking operations, unnecessary work

            ## Incremental Reviews

            For subsequent pushes (synchronize events):
            - Check your previous review comments on this PR
            - Reuse finding IDs if the same issue persists (even if line numbers changed)
            - Only report NEW issues or confirm unresolved ones
            - Note when previously flagged issues are resolved
            For initial reviews, do a full assessment.

            ## Response Format

            **Score: X/10**
            **Recommendation: MERGE ✅ | REVISE 🔄 | BLOCK ❌**

            Thresholds: 8-10 = MERGE ✅, 5-7 = REVISE 🔄, 1-4 = BLOCK ❌

            List issues as:

            #### Issue: Brief description
            **ID:** {file-slug}-{semantic-slug}-{4char-hash}
            **File:** path/to/file.ext:line
            **Severity:** 🔴 Critical | 🟡 Important | 🔵 Nit
            Explanation + fix.

            If no issues: "✅ No issues found"
            Be concise. Issues only, no praise.
