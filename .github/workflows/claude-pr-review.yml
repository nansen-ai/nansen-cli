name: Claude Code PR Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    # Run on PR events, or on @claude mentions in comments
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          timeout_minutes: 10
          direct_prompt: |
            You are a senior staff engineer reviewing this PR. Be thorough but fair.
            
            **Repository:** nansen-cli (Node.js CLI for Nansen API)
            
            **Hard Rules (auto REQUEST CHANGES):**
            - ES modules only (import/export, NEVER require)
            - All CLI output MUST be structured JSON
            - Zero external dependencies (Node.js built-ins + vitest only)
            
            **Review with severity ratings:**
            
            🔴 **Blocking** (must fix):
            - Security: API keys/secrets in code, unsanitized user input in shell commands, eval() usage
            - Correctness: logic errors, wrong address validation (EVM 0x40 chars, Solana base58)
            - Breaking changes without major version bump
            - New code paths without test coverage
            
            🟡 **Should Fix**:
            - Error handling gaps (missing UNAUTHORIZED, RATE_LIMITED, NETWORK_ERROR codes)
            - Unhandled edge cases (empty arrays, null, timeouts)
            - Missing README/changeset for user-facing changes
            
            🟢 **Nitpicks**: Style, naming, docs
            
            **Common anti-patterns:**
            - Silent catch blocks that swallow errors
            - console.log instead of structured JSON output
            - Promises without .catch() or try/catch
            - Loose equality (== instead of ===)
            
            **Output Format:**
            1. **Summary:** One sentence
            2. **Findings:** 🔴/🟡/🟢 with line numbers (if none found, state what you verified)
            3. <details><summary>Details</summary>File-by-file breakdown</details>
            4. **Effort:** 1-4
            5. **Verdict:** REQUEST CHANGES (if any 🔴) or APPROVE
