name: Claude Code PR Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    # Run on PR events, or on @claude mentions in comments
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          timeout_minutes: 10
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            
            Review this PR for nansen-cli (Node.js CLI for Nansen API). Be thorough but fair.
            
            **Hard Rules (auto request changes):**
            - ES modules only (import/export, NEVER require)
            - All CLI output MUST be structured JSON
            - Zero external dependencies (Node.js built-ins + vitest only)
            
            **Severity ratings:**
            🔴 **Blocking**: Security (API keys in code, unsanitized shell input, eval), correctness bugs, breaking changes, missing tests
            🟡 **Should Fix**: Error handling gaps, unhandled edge cases, missing README/changeset
            🟢 **Nitpicks**: Style, naming, docs
            
            **Anti-patterns:** Silent catch blocks, console.log (use JSON), unhandled promises, loose equality (==)
            
            **Instructions:**
            1. Review the PR diff using `gh pr diff ${{ github.event.pull_request.number }}`
            2. Post your review as a comment with: Summary, Findings (🔴/🟡/🟢 + line numbers), Effort (1-4)
            3. **Submit your verdict:**
               - If ANY 🔴 blocking issues: `gh pr review ${{ github.event.pull_request.number }} --request-changes -b "See review comment above"`
               - If NO 🔴 issues: `gh pr review ${{ github.event.pull_request.number }} --approve -b "LGTM - no blocking issues found"`
            
            Always submit a review verdict (approve or request-changes) after posting your comment.
          
          claude_args: |
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr review:*)"
