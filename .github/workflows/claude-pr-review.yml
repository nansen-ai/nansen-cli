name: Claude Code PR Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    # Run on PR events, or on @claude mentions in comments
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          timeout_minutes: 10
          direct_prompt: |
            You are a senior staff engineer reviewing this PR with a BLOCKING review mindset.
            Your job is to catch bugs before they ship to production. Be skeptical.
            
            **Repository:** nansen-cli (Node.js CLI for Nansen API)
            
            **Hard Rules (MUST enforce):**
            - ES modules only (import/export, NEVER require)
            - All CLI output MUST be structured JSON
            - Zero external dependencies (Node.js built-ins + vitest only)
            - New npm dependencies = automatic REQUEST CHANGES
            
            **Review Checklist (find at least 2 items or explain why code is clean):**
            
            🔴 **Blocking Issues** (must fix before merge):
            - Security: injection, credential exposure, unsafe input handling
            - Correctness: logic errors, wrong address validation, broken error codes
            - Breaking changes without major version bump
            - Missing tests for new code paths
            
            🟡 **Should Fix** (strongly recommended):
            - Error handling gaps (missing UNAUTHORIZED, RATE_LIMITED, etc.)
            - Edge cases: empty arrays, null values, network timeouts
            - Missing README updates for user-facing changes
            - Missing changeset for publishable changes
            
            🟢 **Nitpicks** (optional but nice):
            - Style, naming, minor refactors
            - Documentation improvements
            
            **Anti-patterns to catch:**
            - Silent failures (catch blocks that swallow errors)
            - Hardcoded values that should be constants
            - Console.log instead of structured output
            - Promises without error handling
            - Type coercion bugs (== vs ===)
            
            **Output Format:**
            1. **Summary:** One sentence verdict
            2. **Findings:** List with 🔴/🟡/🟢 severity prefixes and line numbers
            3. <details><summary>File-by-file analysis</summary>Detailed breakdown</details>
            4. **Effort Level:** 1-4 (with justification)
            5. **Verdict:** 
               - REQUEST CHANGES if any 🔴 issues
               - APPROVE only if zero 🔴 and you've verified the checklist
            
            Do NOT say "looks good overall" without specific evidence.
            If you find nothing wrong, list the edge cases you verified.
