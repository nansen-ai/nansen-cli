name: Sync Skills to ClawHub

on:
  release:
    types: [published]
  workflow_dispatch: # allow manual trigger for testing / forced resync

jobs:
  sync-clawhub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ClawHub
        run: npx --yes clawhub@0.7.0 login --token "$CLAWHUB_TOKEN" --no-browser
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Sync skills to ClawHub
        run: npx --yes clawhub@0.7.0 sync --all --workdir . --dir skills
