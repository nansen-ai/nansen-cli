name: "AI Security Review"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  scan:
    runs-on: ubuntu-latest
    outputs:
      audit_summary: ${{ steps.audit.outputs.summary }}
      secrets_found: ${{ steps.secrets.outputs.found }}
      secret_details: ${{ steps.secrets.outputs.details }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: npm audit
        id: audit
        run: |
          OUTPUT=$(npm audit 2>&1 || true)
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "summary<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" | tail -20 >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Secret scan
        id: secrets
        run: |
          git diff origin/main...HEAD > full_diff.txt
          FINDINGS=$(grep -Pn '^\+.*?(api[_-]?key|secret|password|token|private[_-]?key)\s*[:=]\s*["'"'"']?[a-zA-Z0-9+/=_\-]{16,}' full_diff.txt 2>/dev/null || true)
          if [ -n "$FINDINGS" ]; then
            echo "found=⚠️ Potential hardcoded secrets detected" >> "$GITHUB_OUTPUT"
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "details<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$FINDINGS" | head -20 >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          else
            echo "found=✅ No hardcoded secrets detected" >> "$GITHUB_OUTPUT"
            echo "details=None" >> "$GITHUB_OUTPUT"
          fi

  review:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude security review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          track_progress: true
          use_sticky_comment: true
          claude_args: --allowedTools "Read,Glob,Grep,WebFetch"
          prompt: |
            You are a security engineer reviewing a PR for nansen-cli, an open-source Node.js CLI for the Nansen blockchain analytics API. Users handle crypto wallets, API keys, and financial data. Security is critical.

            ## Automated Scan Results

            **Secret Scan:** ${{ needs.scan.outputs.secrets_found }}
            ```
            ${{ needs.scan.outputs.secret_details }}
            ```

            **npm audit:**
            ```
            ${{ needs.scan.outputs.audit_summary }}
            ```

            ## Instructions

            Read the FULL source files for context — don't rely on diffs alone.

            Review criteria:
            1. Secrets & Credentials — Hardcoded keys/tokens? Credentials in logs/errors?
            2. Input Validation — Sanitized inputs? Command injection? Path traversal?
            3. API Security — Keys transmitted/stored securely? Auth headers?
            4. Dependency Risk — New deps justified? Known vulns? Typosquatting?
            5. Data Exposure — Sensitive data in logs, errors, stack traces?
            6. Code Injection — eval(), Function(), dynamic require()?
            7. File System — Safe file ops? Temp files? Symlink attacks?
            8. Network — TLS enforced? SSRF vectors?
            9. Crypto/Wallet Ops — Key handling, signing safety, replay attacks?
            10. Supply Chain — Package.json changes? Lock file integrity? Postinstall scripts?

            ## Incremental Reviews

            For subsequent pushes:
            - Check previous security review comments on this PR
            - Reuse finding IDs if same issue persists
            - Only report NEW findings or confirm unresolved ones
            - Note resolved findings
            For initial reviews, do full assessment.

            ## Response Format

            **Score: X/10**
            **Recommendation: APPROVE ✅ | FIX REQUIRED 🔄 | BLOCK ❌**

            Thresholds: 8-10 = APPROVE ✅, 5-7 = FIX REQUIRED 🔄, 1-4 = BLOCK ❌

            List findings as:

            #### Finding: Brief description
            **ID:** {file-slug}-{semantic-slug}-{4char-hash}
            **File:** path/to/file.ext:line
            **Severity:** 🔴 Critical | 🟠 High | 🟡 Medium | 🔵 Low
            Risk explanation + recommended fix.

            Then:
            #### Dependency Audit
            (npm audit summary — flag concerns)

            #### Secrets Scan
            (Confirm or dismiss automated findings)

            If no issues: "✅ No security issues found"
            Be concise. Findings only, no praise.
